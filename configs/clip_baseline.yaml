# CLIP baseline. Used in the encoder ablation in evals/results.md.
# Same FAISS settings, same data, same queries — only the encoder changes.

embedding:
  backend: clip
  model_name: openai/clip-vit-large-patch14
  image_size: 224
  batch_size: 64
  normalize: true

index:
  index_type: ivf_flat
  nlist: 256
  nprobe: 8
  metric: ip
  use_gpu: true

vlm:
  enabled: false  # we don't caption during ablation runs

retrieval:
  top_k: 50
  rerank_top_k: null
  min_score: 0.0

data:
  dataset: celeba
  images_dir: data/celeba/img_align_celeba
  attributes_csv: data/celeba/list_attr_celeba.csv
  eval_split_csv: data/celeba/list_eval_partition.csv

artifacts_dir: artifacts
seed: 42
