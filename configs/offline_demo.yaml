# Offline demo config — runs without internet, without a GPU.
# Uses the hash-based encoder over the synthetic corpus generated by
# scripts/generate_synthetic_data.py. This is for end-to-end pipeline
# validation only; quality numbers are not meaningful.
#
# For real numbers, use configs/default.yaml (SigLIP-2) instead.

embedding:
  backend: hash
  model_name: data/celeba_synthetic/list_attr_celeba.csv  # repurposed: path to attr CSV
  image_size: 218
  batch_size: 64
  normalize: true

index:
  index_type: flat       # exact search; corpus is small in the demo
  nlist: 16
  nprobe: 8
  metric: ip
  use_gpu: false

vlm:
  enabled: false  # the VLM stage needs HF access; disable for the offline demo

retrieval:
  top_k: 12
  rerank_top_k: null
  min_score: 0.0

data:
  dataset: celeba
  images_dir: data/celeba_synthetic/img_align_celeba
  attributes_csv: data/celeba_synthetic/list_attr_celeba.csv
  eval_split_csv: data/celeba_synthetic/list_eval_partition.csv

artifacts_dir: artifacts
seed: 42
