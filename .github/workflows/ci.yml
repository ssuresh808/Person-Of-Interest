name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff==0.6.9
      - name: Ruff check
        run: ruff check src tests scripts
      - name: Ruff format check
        run: ruff format --check src tests scripts

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (CPU-only)
        run: |
          # CI does not have a GPU. Install CPU torch + faiss-cpu so the
          # test suite runs without trying to compile against CUDA.
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install faiss-cpu
          # Editable install pulls in the rest from pyproject.toml. The
          # platform marker on faiss-gpu means only faiss-cpu is installed
          # on macOS-like runners; on Linux we already installed faiss-cpu
          # above, which satisfies the constraint.
          pip install -e ".[dev]"
      - name: Run tests (excluding GPU-marked)
        run: pytest -m "not gpu and not integration" --no-cov -v

  type-check:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install faiss-cpu
          pip install -e ".[dev]"
      - name: mypy
        run: mypy src/poi
        # mypy is informational here — strict mode isn't on yet.
        continue-on-error: true
